<!DOCTYPE html>
<html>
<head>
    <title>麻將牌圖片測試</title>
    <style>
        .tile {
            width: 60px;
            height: 84px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: inline-block;
            margin: 5px;
        }
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .row { margin: 20px 0; }
        .row-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>麻將牌圖片資源測試</h1>
    
    <div class="row">
        <div class="row-title">筒子 (p1-p9)</div>
        <div id="tong-row"></div>
    </div>
    
    <div class="row">
        <div class="row-title">萬子 (m1-m9)</div>
        <div id="wan-row"></div>
    </div>
    
    <div class="row">
        <div class="row-title">條子 (s1-s9)</div>
        <div id="tiao-row"></div>
    </div>
    
    <script>
        // 測試不同的麻將牌圖片資源
        const sources = [
            // 來源 1: Mahjong Gifs
            { prefix: 'https://mahjong-gifs.github.io/images/', format: '{suit}{num}.png' },
            // 來源 2: GitHub - mahjong-assets
            { prefix: 'https://raw.githubusercontent.com/aceforth/mahjong-assets/master/png/', format: '{suit}_{num}.png' },
            // 來源 3: 直接嵌入 base64（如果外部資源都失敗）
        ];
        
        // 筒子：p1-p9, 萬子：m1-m9, 條子：s1-s9
        const suits = {
            tong: { name: '筒子', prefix: 'p' },
            wan: { name: '萬子', prefix: 'm' },
            tiao: { name: '條子', prefix: 's' }
        };
        
        function testImages() {
            for (const [suitKey, suit] of Object.entries(suits)) {
                const row = document.getElementById(`${suitKey}-row`);
                row.innerHTML = '';
                
                for (let num = 1; num <= 9; num++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    
                    const img = document.createElement('img');
                    img.alt = `${suit.name}${num}`;
                    
                    // 測試來源 1
                    img.src = `${sources[0].prefix}${suit.prefix}${num}.png`;
                    
                    img.onerror = () => {
                        // 來源 1 失敗，嘗試來源 2
                        img.src = `${sources[1].prefix}${suit.prefix}_${num}.png`;
                    };
                    
                    img.onerror = () => {
                        // 都失敗，顯示文字
                        tile.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#666;">${suit.name}${num}</div>`;
                    };
                    
                    tile.appendChild(img);
                    row.appendChild(tile);
                }
            }
        }
        
        testImages();
    </script>
</body>
</html>
