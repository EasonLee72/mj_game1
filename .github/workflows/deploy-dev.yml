name: 🚀 Deploy Development Version

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
      
      - name: 📂 Copy files to dev folder
        run: |
          mkdir -p dev-dist
          cp index.html dev-dist/
          cp firebase-storage.js dev-dist/
          cp -r tiles dev-dist/
          cp README.md dev-dist/ 2>/dev/null || true
      
      - name: 🚀 Deploy to gh-pages branch (dev subfolder)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dev-dist
          destination_dir: dev
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
