name: 🚀 Deploy Development Version

on:
  push:
    branches:
      - develop

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📁 Create dev directory
        run: |
          mkdir -p dev
          cp index.html dev/
          cp firebase-storage.js dev/
          cp -r tiles dev/
          cp *.md dev/ 2>/dev/null || true
      
      - name: 🚀 Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
          
      - name: 📝 Deploy dev to subfolder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dev
          destination_dir: dev
          keep_files: true
